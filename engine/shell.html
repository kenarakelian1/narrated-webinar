<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!--TITLE--></title>
<style>
/*PLAYER_CSS*/
/*SCENE_CSS*/
</style>
</head>
<body>

  <!-- ================= START SCREEN ================= -->
  <div id="start-screen">
    <div class="title-eyebrow"><!--EYEBROW--></div>
    <h1 class="title-main"><!--TITLE--></h1>
    <p class="title-sub"><!--SUBTITLE--></p>
    <div class="preview-grid">
      <!--PREVIEW_PILLARS-->
    </div>
    <button class="play-button" id="play-btn" aria-label="Start webinar">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>
    <div class="start-meta"><!--START_META--></div>
    <div class="property-line"><!--PROPERTY_LINE--></div>
  </div>

  <!-- ================= APP ================= -->
  <div id="app">

    <!-- Sidebar -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-eyebrow"><!--SIDEBAR_EYEBROW--></div>
        <div class="sidebar-title"><!--SIDEBAR_TITLE--></div>
      </div>
      <ul class="chapter-list" id="chapter-list"></ul>
    </aside>

    <!-- Stage -->
    <main id="stage">

      <!--SCENES_HTML-->

    </main>

    <!-- Bottom controls -->
    <div id="bottom-bar">
      <button class="control-btn" id="prev-btn" aria-label="Previous segment">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="control-btn" id="pause-btn" aria-label="Pause">
        <svg viewBox="0 0 24 24" id="icon-pause"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        <svg viewBox="0 0 24 24" id="icon-play" class="hidden"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="control-btn" id="next-btn" aria-label="Next segment">
        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
      </button>
      <div class="segment-info">
        <span class="segment-chapter" id="segment-chapter">—</span>
        <span class="segment-title" id="segment-title">—</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="time-display" id="time-display">0:00 / 0:00</div>
    </div>

    <div id="stage-property"><!--STAGE_PROPERTY--></div>

  </div>

<script>
/*PLAYER_JS*/
</script>
</body>
</html>
